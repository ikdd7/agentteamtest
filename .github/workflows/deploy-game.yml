name: Deploy 설렘 100% to GitHub Pages

on:
  push:
    branches: [claude/dating-sim-game-plan-g42mb9]
    paths:
      - "game/**"
      - ".github/workflows/deploy-game.yml"
  workflow_dispatch:

permissions:
  contents: write # gh-pages 브랜치에 push
  pages: write # Pages 소스 설정(API)

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: game/package-lock.json

      - name: Install / Test / Build
        working-directory: game
        run: |
          npm ci
          npm test
          npm run build

      # 빌드 산출물(dist)을 gh-pages 브랜치로 배포 (환경 보호규칙 영향 없음)
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game/dist
          publish_branch: gh-pages

      # Pages가 gh-pages 브랜치를 서빙하도록 소스 설정(이미 workflow 소스면 branch로 전환)
      - name: Point Pages at gh-pages branch
        run: |
          repo="${{ github.repository }}"
          body='{"source":{"branch":"gh-pages","path":"/"},"build_type":"legacy"}'
          code=$(curl -s -o /tmp/pages.out -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/pages" -d "$body")
          echo "PUT /pages -> $code"; cat /tmp/pages.out || true
          if [ "$code" -ge 400 ]; then
            code=$(curl -s -o /tmp/pages.out -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/pages" -d "$body")
            echo "POST /pages -> $code"; cat /tmp/pages.out || true
          fi
