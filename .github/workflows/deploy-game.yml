name: Deploy 설렘 100% to GitHub Pages

on:
  push:
    branches: [claude/dating-sim-game-plan-g42mb9]
    paths:
      - "game/**"
      - ".github/workflows/deploy-game.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: game/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

      # Pages가 꺼져 있으면 자동 활성화(enablement: true)
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: game/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
