name: Deploy bag-deco prototype to GitHub Pages

on:
  push:
    branches:
      - claude/bag-decoration-trends-bxh5bj
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload prototype as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/bag-deco

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
