name: Deploy 느좋점수 prototype to GitHub Pages

on:
  push:
    branches:
      - claude/celebrity-outfit-game-idea-3bm3kv
    paths:
      - 'prototype/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개만 (최신 우선)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload prototype as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./prototype

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
