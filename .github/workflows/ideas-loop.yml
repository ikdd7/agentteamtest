name: 사업 아이디어 30분 루프

on:
  schedule:
    # 30분마다 실행 (UTC 기준). GitHub Actions 스케줄은 부하에 따라 수 분 지연될 수 있음.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # 수동 실행 버튼

permissions:
  contents: write  # 생성 결과를 브랜치에 커밋/푸시

concurrency:
  group: ideas-loop
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/loop-app-ideas-xmabhm

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install anthropic

      - name: 아이디어 10개 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_ideas.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/business-ideas-loop.md; then
            echo "변경 사항 없음 — 커밋 생략"
            exit 0
          fi
          git add docs/business-ideas-loop.md
          git commit -m "Add business ideas batch (automated)"
          git push origin claude/loop-app-ideas-xmabhm
