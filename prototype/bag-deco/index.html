<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>백꾸 스튜디오 — 가방 꾸미기 프로토타입</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🎀</span>
      <div>
        <h1>백꾸 스튜디오</h1>
        <p class="tagline">달아보고 · 마음에 들면 · 바로 담기</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="btn-reset" class="btn btn-ghost" type="button">↺ 초기화</button>
      <button id="btn-save" class="btn btn-primary" type="button">📸 이미지 저장</button>
    </div>
  </header>

  <main class="layout">
    <!-- 좌측: 아이템 팔레트 -->
    <section class="panel palette" aria-label="아이템 팔레트">
      <div class="panel-head">
        <h2>가방 고르기</h2>
      </div>
      <div class="bag-picker" id="bag-picker"></div>
      <label class="upload">
        <input type="file" id="bag-upload" accept="image/*" hidden />
        <span>＋ 내 가방 사진 올리기</span>
      </label>

      <div class="panel-head">
        <h2>키링 · 참 · 스티커</h2>
        <p class="hint">탭하거나 캔버스로 끌어다 놓으세요</p>
      </div>
      <div class="charm-grid" id="charm-grid"></div>
      <label class="upload">
        <input type="file" id="charm-upload" accept="image/*" hidden />
        <span>＋ 내 키링 사진 올리기</span>
      </label>
    </section>

    <!-- 중앙: 꾸미기 캔버스 -->
    <section class="stage-wrap">
      <div class="stage" id="stage">
        <div class="bag-layer" id="bag-layer" aria-hidden="true">👜</div>
        <div class="charm-layer" id="charm-layer"></div>
        <p class="empty-tip" id="empty-tip">아이템을 탭해서 가방을 꾸며보세요 ✨</p>
      </div>

      <!-- 선택된 아이템 조작 바 -->
      <div class="tool-dock" id="tool-dock" hidden>
        <span class="tool-label" id="tool-label">아이템</span>
        <label class="slider">크기
          <input type="range" id="ctl-size" min="40" max="180" value="80" />
        </label>
        <label class="slider">회전
          <input type="range" id="ctl-rot" min="-180" max="180" value="0" />
        </label>
        <button id="ctl-front" class="btn btn-ghost btn-sm" type="button">맨 앞으로</button>
        <button id="ctl-info" class="btn btn-ghost btn-sm" type="button">ℹ️ 상세</button>
        <button id="ctl-buy" class="btn btn-primary btn-sm" type="button">🛒 사러 가기</button>
        <button id="ctl-del" class="btn btn-danger btn-sm" type="button">🗑 삭제</button>
      </div>
    </section>

    <!-- 우측: 쇼핑 리스트 (아웃바운드) -->
    <aside class="panel cart" aria-label="쇼핑 리스트">
      <div class="panel-head">
        <h2>담은 아이템 · 쇼핑 리스트</h2>
        <p class="hint">아이템마다 실제 판매처로 이동해요</p>
      </div>
      <ul class="cart-list" id="cart-list"></ul>
      <div class="cart-foot">
        <div class="cart-total">
          <span>예상가 합계</span>
          <strong id="cart-total">0원</strong>
        </div>
        <button class="btn btn-primary btn-block" id="btn-copy" type="button">📋 쇼핑 리스트 복사 · 공유</button>
        <p class="demo-note" id="outbound-stat">판매처 이동 0회 · 제휴 트래픽 데모</p>
      </div>
    </aside>
  </main>

  <!-- 아이템 상세 정보 카드 (오늘의집형) -->
  <div class="detail-backdrop" id="detail-card" hidden>
    <div class="detail" role="dialog" aria-modal="true">
      <button class="detail-close" id="detail-close" type="button" aria-label="닫기">✕</button>
      <div class="detail-top">
        <div class="detail-thumb" id="detail-thumb"></div>
        <div class="detail-meta">
          <span class="detail-brand" id="detail-brand"></span>
          <h3 class="detail-name" id="detail-name"></h3>
          <p class="detail-price" id="detail-price"></p>
        </div>
      </div>
      <div class="detail-chips" id="detail-chips"></div>
      <p class="detail-desc" id="detail-desc"></p>
      <div class="detail-actions">
        <button class="btn btn-ghost" id="detail-add" type="button">＋ 가방에 올리기</button>
        <button class="btn btn-primary" id="detail-buy" type="button">🛒 사러 가기 →</button>
      </div>
      <p class="detail-note">판매처(네이버쇼핑)로 이동합니다 · 제휴 트래픽 데모</p>
    </div>
  </div>

  <canvas id="export-canvas" hidden></canvas>
  <script src="app.js"></script>
</body>
</html>
