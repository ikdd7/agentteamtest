<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; width: 260px; margin: 0; background: #faf8f3; color: #1a1a1a; }
    .head { padding: 14px 16px 10px; font-weight: 700; font-size: 13px; color: #6b5d3f; letter-spacing: .04em; border-bottom: 1px solid #ece7db; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; font-size: 13px; }
    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 999px; cursor: pointer; transition: .15s; }
    .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .15s; }
    input:checked + .slider { background: #a0742c; }
    input:checked + .slider::before { transform: translateX(18px); }
    .key { padding: 0 16px 8px; font-size: 12px; }
    .key.ok { color: #2e7d32; }
    .key.missing { color: #b03030; }
    .foot { padding: 10px 16px 14px; border-top: 1px solid #ece7db; }
    .foot button { width: 100%; padding: 8px; font-size: 13px; border: 1px solid #d9d4c8; background: #fff; border-radius: 8px; cursor: pointer; }
    .foot button:hover { background: #f0ead9; }
    .tip { padding: 0 16px 12px; font-size: 11.5px; color: #8a8272; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="head">SENTENCE LENS</div>
  <div class="row">
    <span>문장 분석 사용</span>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>
  <div class="key" id="keyStatus"></div>
  <div class="tip">웹페이지에서 문장을 <b>드래그</b>하거나 <b>Alt+클릭</b>하면 번역·문장구조·단어를 분석합니다.</div>
  <div class="foot">
    <button id="openOptions">설정 열기</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
