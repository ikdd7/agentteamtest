<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>퇴사버튼 🔴</title>
<style>
  :root {
    --bg: #232338;
    --bg-soft: #2d2d4a;
    --card: #34345c;
    --red: #ff6b81;
    --red-deep: #ee5265;
    --peach: #ffb8b8;
    --cream: #fff5e1;
    --text: #f3f0ff;
    --sub: #a5a1c9;
    --mint: #7bed9f;
    --yellow: #ffd97d;
    --radius: 24px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.shake { animation: screenshake .45s ease; }
  @keyframes screenshake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-8px,4px) rotate(-.5deg); }
    40% { transform: translate(7px,-5px) rotate(.5deg); }
    60% { transform: translate(-5px,3px); }
    80% { transform: translate(4px,-2px); }
  }

  /* ── floating background sparkles ── */
  .sparkle {
    position: fixed; pointer-events: none; font-size: 14px; opacity: .35;
    animation: floaty linear infinite;
    z-index: 0;
  }
  @keyframes floaty {
    from { transform: translateY(105vh) rotate(0deg); }
    to   { transform: translateY(-10vh) rotate(360deg); }
  }

  main { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 24px 20px 80px; }

  /* ── hero ── */
  .hero { text-align: center; padding-top: 28px; }
  .hero h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .hero h1 .dot { color: var(--red); }
  .hero .tagline { margin-top: 6px; font-size: 14px; color: var(--sub); }

  /* ── button stage ── */
  .stage { position: relative; display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
  .ring-wrap { position: relative; width: 260px; height: 260px; display:flex; align-items:center; justify-content:center; }
  svg.ring { position: absolute; inset: 0; transform: rotate(-90deg); }
  svg.ring circle.track { fill: none; stroke: #3d3d66; stroke-width: 7; stroke-linecap: round; }
  svg.ring circle.prog  { fill: none; stroke: var(--yellow); stroke-width: 7; stroke-linecap: round;
    stroke-dasharray: 754; stroke-dashoffset: 754; }

  .btn-quit {
    width: 200px; height: 200px; border: none; cursor: pointer;
    border-radius: 46% 54% 52% 48% / 50% 46% 54% 50%;
    background: radial-gradient(circle at 34% 28%, #ff9aa8 0%, var(--red) 45%, var(--red-deep) 100%);
    box-shadow: 0 14px 0 #c23a52, 0 22px 40px rgba(238,82,101,.35), inset 0 -8px 18px rgba(0,0,0,.12);
    position: relative; user-select: none; touch-action: none;
    animation: breathe 4s ease-in-out infinite;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1)   rotate(0deg); }
    50%     { transform: scale(1.03) rotate(1deg); }
  }
  .btn-quit.holding { animation: none; transform: scale(.93) translateY(8px); box-shadow: 0 6px 0 #c23a52, 0 10px 24px rgba(238,82,101,.45), inset 0 -8px 18px rgba(0,0,0,.12); }
  .btn-quit.fired   { animation: pop .5s ease; }
  @keyframes pop {
    0% { transform: scale(.85); } 45% { transform: scale(1.14); } 70% { transform: scale(.96); } 100% { transform: scale(1); }
  }
  .btn-quit.bounce { animation: bounceback .55s cubic-bezier(.34,1.56,.64,1); }
  @keyframes bounceback {
    0% { transform: scale(.93) translateY(8px); } 55% { transform: scale(1.08) translateY(-6px); } 100% { transform: scale(1); }
  }

  /* face */
  .face { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; pointer-events: none; }
  .eyes { display: flex; gap: 44px; }
  .eye  { width: 16px; height: 22px; background: #5c1f2e; border-radius: 50%; transition: all .15s ease; }
  .btn-quit.holding .eye { height: 4px; border-radius: 4px; margin-top: 9px; }   /* >_< squint */
  .mouth { width: 26px; height: 14px; border: 4px solid #5c1f2e; border-top: none; border-radius: 0 0 22px 22px; transition: all .15s ease; }
  .btn-quit.holding .mouth { width: 14px; height: 14px; border: 4px solid #5c1f2e; border-radius: 50%; background: #7e2c3f; }
  .cheeks { position: absolute; top: 55%; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; }
  .cheek { width: 22px; height: 12px; background: rgba(255,255,255,.35); border-radius: 50%; filter: blur(1px); }

  .hint { margin-top: 22px; font-size: 14px; color: var(--sub); text-align:center; min-height: 42px; line-height: 1.5; }
  .hint b { color: var(--yellow); font-weight: 600; }

  /* ── counter ── */
  .counter-card {
    margin-top: 18px; background: var(--bg-soft); border-radius: var(--radius);
    padding: 18px 22px; text-align: center; width: 100%;
    border: 2px dashed #454573;
  }
  .counter-label { font-size: 13px; color: var(--sub); }
  .counter-num { font-size: 34px; font-weight: 800; color: var(--peach); letter-spacing: 1px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .counter-num.bump { animation: bump .3s ease; }
  @keyframes bump { 50% { transform: scale(1.18); color: var(--yellow); } }
  .counter-sub { font-size: 12px; color: var(--sub); margin-top: 4px; }

  /* ── section ── */
  section { margin-top: 44px; }
  section h2 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  section h2 .badge { font-size: 11px; background: var(--card); color: var(--sub); padding: 3px 10px; border-radius: 999px; font-weight: 500; }

  /* ── reason input ── */
  .reason-box { margin-top: 14px; background: var(--bg-soft); border-radius: var(--radius); padding: 16px; }
  .reason-box textarea {
    width: 100%; background: transparent; border: none; outline: none; resize: none;
    color: var(--text); font-size: 14px; font-family: inherit; line-height: 1.6; height: 54px;
  }
  .reason-box textarea::placeholder { color: #6d6a96; }
  .reason-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .char-count { font-size: 12px; color: var(--sub); }
  .btn-post {
    background: var(--red); color: #fff; border: none; border-radius: 999px;
    padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 0 #c23a52; transition: transform .1s, box-shadow .1s;
  }
  .btn-post:active { transform: translateY(3px); box-shadow: 0 1px 0 #c23a52; }
  .btn-post:disabled { opacity: .4; box-shadow: none; }

  /* ── feed ── */
  .feed { margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
  .feed-card {
    background: var(--card); border-radius: var(--radius); padding: 16px 18px;
    animation: slidein .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slidein { from { opacity: 0; transform: translateY(14px) scale(.97); } }
  .feed-text { font-size: 14px; line-height: 1.6; }
  .feed-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .feed-time { font-size: 11px; color: var(--sub); }
  .btn-metoo {
    background: var(--bg-soft); border: 1.5px solid #4a4a7a; color: var(--peach);
    border-radius: 999px; padding: 7px 14px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .15s ease; display: flex; align-items: center; gap: 6px;
  }
  .btn-metoo.on { background: #4a2438; border-color: var(--red); color: #fff; }
  .btn-metoo.pop2 { animation: bump .3s ease; }

  /* ── my stats ── */
  .stats { margin-top: 14px; display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .stat {
    background: var(--bg-soft); border-radius: 20px; padding: 16px 8px; text-align: center;
  }
  .stat .n { font-size: 24px; font-weight: 800; color: var(--mint); }
  .stat .l { font-size: 11.5px; color: var(--sub); margin-top: 4px; }
  .stat-msg { margin-top: 12px; font-size: 13px; color: var(--sub); text-align: center; line-height: 1.6; }

  /* ── meme modal ── */
  .modal {
    position: fixed; inset: 0; background: rgba(15,15,30,.78); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 24px;
  }
  .modal.show { display: flex; }
  .modal-inner { background: var(--bg-soft); border-radius: 28px; padding: 20px; max-width: 360px; width: 100%; text-align: center; animation: slidein .35s cubic-bezier(.34,1.56,.64,1); }
  .modal-inner canvas { width: 100%; border-radius: 18px; display: block; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
  .modal-btns button {
    flex: 1; border: none; border-radius: 16px; padding: 13px 0; font-size: 13.5px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: transform .1s;
  }
  .modal-btns button:active { transform: scale(.96); }
  .btn-save  { background: var(--red); color: #fff; box-shadow: 0 4px 0 #c23a52; }
  .btn-close { background: var(--card); color: var(--sub); }

  /* ── toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--cream); color: #4a3540; font-size: 13.5px; font-weight: 600;
    padding: 12px 22px; border-radius: 999px; z-index: 60; opacity: 0;
    transition: all .35s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 8px 24px rgba(0,0,0,.3);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  footer { margin-top: 56px; text-align: center; font-size: 11.5px; color: #5d5a85; line-height: 1.8; }

  canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 40; }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<main>
  <div class="hero">
    <h1>퇴사버튼 <span class="dot">🔴</span></h1>
    <p class="tagline">퇴사하고 싶으면 꾹— 눌러주세요</p>
  </div>

  <div class="stage">
    <div class="ring-wrap">
      <svg class="ring" width="260" height="260" viewBox="0 0 260 260">
        <circle class="track" cx="130" cy="130" r="120"></circle>
        <circle class="prog" id="progRing" cx="130" cy="130" r="120"></circle>
      </svg>
      <button class="btn-quit" id="quitBtn" aria-label="퇴사버튼 — 1.2초간 길게 누르기">
        <div class="face">
          <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
          <div class="mouth"></div>
          <div class="cheeks"><div class="cheek"></div><div class="cheek"></div></div>
        </div>
      </button>
    </div>
    <p class="hint" id="hint">버튼을 <b>1.2초</b> 동안 꾹 누르고 있으면 발사돼요</p>

    <div class="counter-card">
      <div class="counter-label">오늘 전국에서</div>
      <div class="counter-num" id="todayCount">0</div>
      <div class="counter-sub">번의 퇴사 욕구가 접수됐어요 <span id="liveDot">·</span></div>
    </div>
  </div>

  <section>
    <h2>😤 오늘의 사유 <span class="badge">익명 · 140자</span></h2>
    <div class="reason-box">
      <textarea id="reasonInput" maxlength="140" placeholder="무슨 일이 있었나요? 여기서만 살짝 얘기해요… (회사명·이름은 자동으로 가려드려요)"></textarea>
      <div class="reason-foot">
        <span class="char-count" id="charCount">0 / 140</span>
        <button class="btn-post" id="postBtn" disabled>털어놓기</button>
      </div>
    </div>
    <div class="feed" id="feed"></div>
  </section>

  <section>
    <h2>🌱 나의 기록 <span class="badge">이 기기에만 저장돼요</span></h2>
    <div class="stats">
      <div class="stat"><div class="n" id="stToday">0</div><div class="l">오늘</div></div>
      <div class="stat"><div class="n" id="stTotal">0</div><div class="l">누적</div></div>
      <div class="stat"><div class="n" id="stStreak">0</div><div class="l">연속 출석일</div></div>
    </div>
    <p class="stat-msg" id="statMsg">아직 한 번도 안 눌렀어요. 괜찮은 하루인가 봐요! 🍀</p>
  </section>

  <footer>
    프로토타입 데모 — 전국 카운터와 예시 사유는 시뮬레이션이에요.<br>
    수집하는 것: 없음. 우리는 당신이 누군지 몰라요 🤍
  </footer>
</main>

<!-- meme card modal -->
<div class="modal" id="memeModal">
  <div class="modal-inner">
    <div class="modal-title">오늘의 인증 카드 🎉</div>
    <canvas id="memeCanvas" width="720" height="720"></canvas>
    <div class="modal-btns">
      <button class="btn-save" id="saveMeme">이미지 저장</button>
      <button class="btn-close" id="closeMeme">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────── utils ─────────────────────────── */
const $ = s => document.querySelector(s);
const todayKey = () => new Date().toISOString().slice(0,10);
const store = {
  get(k, d) { try { return JSON.parse(localStorage.getItem('qb_'+k)) ?? d; } catch { return d; } },
  set(k, v) { localStorage.setItem('qb_'+k, JSON.stringify(v)); }
};
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove('show'), 2200);
}
function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

/* ─────────────────────── background sparkles ─────────────────────── */
const SPARKS = ['✨','⭐','🫧','💫','🌙'];
for (let i = 0; i < 14; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = SPARKS[i % SPARKS.length];
  s.style.left = Math.random()*100 + 'vw';
  s.style.animationDuration = (14 + Math.random()*18) + 's';
  s.style.animationDelay = -(Math.random()*20) + 's';
  s.style.fontSize = (10 + Math.random()*10) + 'px';
  document.body.appendChild(s);
}

/* ─────────────────────── national counter (demo simulation) ───────────────────────
   프로토타입이라 서버가 없어요. 날짜 시드 기반으로 "오늘의 전국 누름 수"를
   흉내내고, 몇 초마다 조금씩 올라가요. (실서비스에선 진짜 카운터로 교체) */
let seed = [...todayKey()].reduce((a,c) => a + c.charCodeAt(0), 0);
function rng() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
const hour = new Date().getHours();
const dayFactor = [0,0,0,0,0,0,.05,.2,.6,.9,1,.95,.7,.8,1,.95,.85,.7,.4,.25,.15,.1,.05,.02][hour] || .3;
let nationalCount = Math.floor((3000 + rng()*4000) * dayFactor) + Math.floor(rng()*200);
const counterEl = $('#todayCount');
function renderCounter() {
  counterEl.textContent = nationalCount.toLocaleString('ko-KR');
  counterEl.classList.remove('bump'); void counterEl.offsetWidth; counterEl.classList.add('bump');
}
renderCounter();
(function liveTick() {
  setTimeout(() => {
    nationalCount += Math.floor(1 + Math.random()*3);
    renderCounter();
    $('#liveDot').textContent = $('#liveDot').textContent === '·' ? '••' : '·';
    liveTick();
  }, 2500 + Math.random()*5500);
})();

/* ─────────────────────── my stats ─────────────────────── */
const stats = store.get('stats', { total: 0, days: {}, lastDay: null, streak: 0 });
function renderStats() {
  const t = stats.days[todayKey()] || 0;
  $('#stToday').textContent = t;
  $('#stTotal').textContent = stats.total;
  $('#stStreak').textContent = stats.streak;
  const msgs =
    t === 0 ? '아직 한 번도 안 눌렀어요. 괜찮은 하루인가 봐요! 🍀' :
    t <= 2  ? '이 정도면 양호해요. 다들 그래요 ☕' :
    t <= 4  ? '음… 오늘 회사에서 무슨 일 있었죠? 🫠' :
              '오늘 좀 심하네요 🥺 꼭 기록해둘게요. 당신 잘못이 아니에요.';
  $('#statMsg').textContent = msgs;
}
function recordPress() {
  const k = todayKey();
  if (stats.lastDay !== k) {
    const y = new Date(Date.now() - 864e5).toISOString().slice(0,10);
    stats.streak = (stats.lastDay === y) ? stats.streak + 1 : 1;
    stats.lastDay = k;
  }
  stats.days[k] = (stats.days[k] || 0) + 1;
  stats.total += 1;
  store.set('stats', stats);
  renderStats();
}
renderStats();

/* ─────────────────────── hold-to-fire button ─────────────────────── */
const HOLD_MS = 1200;
const btn = $('#quitBtn'), ring = $('#progRing'), hint = $('#hint');
const RING_LEN = 754;
let holdStart = null, raf = null, vibeTimer = null, fired = false;

const HINTS_RELEASE = ['아직 아닌가 봐요! 🐣 다행이에요', '오늘은 참아보기로 했군요 …멋져요 🌷', '흠, 마음이 흔들렸군요? 언제든 오세요 🫧'];
const HINTS_FIRED = [
  '접수됐어요. <b>당신만 그런 게 아니에요</b> 🤍',
  '오늘도 버텼네요. 그거면 충분해요 ☁️',
  '괜찮아요, 버튼은 아무한테도 말 안 해요 🤫',
  '내일의 당신은 조금 더 괜찮을 거예요 🌙'
];

function setRing(p) { ring.style.strokeDashoffset = RING_LEN * (1 - p); }

function startHold(e) {
  if (fired) return;
  e.preventDefault();
  holdStart = performance.now();
  btn.classList.add('holding');
  let step = 0;
  vibeTimer = setInterval(() => vibrate(8 + step++ * 4), 150);
  (function loop() {
    const p = Math.min((performance.now() - holdStart) / HOLD_MS, 1);
    setRing(p);
    if (p >= 1) return fire();
    raf = requestAnimationFrame(loop);
  })();
}
function cancelHold() {
  if (fired || holdStart === null) return;
  cancelAnimationFrame(raf); clearInterval(vibeTimer);
  holdStart = null;
  btn.classList.remove('holding');
  btn.classList.add('bounce');
  setTimeout(() => btn.classList.remove('bounce'), 550);
  setRing(0);
  hint.innerHTML = HINTS_RELEASE[Math.floor(Math.random()*HINTS_RELEASE.length)];
}
function fire() {
  cancelAnimationFrame(raf); clearInterval(vibeTimer);
  holdStart = null; fired = true;
  btn.classList.remove('holding');
  btn.classList.add('fired');
  document.body.classList.add('shake');
  vibrate([60, 40, 120]);

  nationalCount += 1;
  const myNumber = nationalCount;
  renderCounter();
  recordPress();
  confettiBurst();

  hint.innerHTML = `<b>${myNumber.toLocaleString('ko-KR')}번째</b> 접수! ` + HINTS_FIRED[Math.floor(Math.random()*HINTS_FIRED.length)];

  setTimeout(() => {
    btn.classList.remove('fired');
    document.body.classList.remove('shake');
    setRing(0);
    fired = false;
  }, 600);
  setTimeout(() => showMeme(myNumber), 900);
}
btn.addEventListener('pointerdown', startHold);
btn.addEventListener('pointerup', cancelHold);
btn.addEventListener('pointerleave', cancelHold);
btn.addEventListener('pointercancel', cancelHold);
btn.addEventListener('contextmenu', e => e.preventDefault());
/* 접근성: 키보드는 스페이스 길게 누르기 대신 엔터 2회 확인 */
let kbArmed = false;
btn.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  e.preventDefault();
  if (!kbArmed) { kbArmed = true; hint.innerHTML = '한 번 더 누르면 발사돼요! ⌨️'; setTimeout(() => kbArmed = false, 1500); }
  else { kbArmed = false; fire(); }
});

/* ─────────────────────── confetti ─────────────────────── */
const cvs = $('#confetti'), ctx = cvs.getContext('2d');
function sizeCanvas(){ cvs.width = innerWidth; cvs.height = innerHeight; }
sizeCanvas(); addEventListener('resize', sizeCanvas);
let parts = [], confettiRaf = null;
const COLORS = ['#ff6b81','#ffd97d','#7bed9f','#70a1ff','#ffb8b8','#fff5e1'];
const EMOJI = ['💥','🎉','⭐','🤍','🌷'];
function confettiBurst() {
  const cx = innerWidth/2, cy = btn.getBoundingClientRect().top + 100;
  for (let i = 0; i < 90; i++) {
    const a = Math.random()*Math.PI*2, v = 4 + Math.random()*9;
    parts.push({
      x: cx, y: cy, vx: Math.cos(a)*v, vy: Math.sin(a)*v - 4,
      rot: Math.random()*360, vr: -6 + Math.random()*12,
      size: 6 + Math.random()*8, life: 1,
      emoji: Math.random() < .15 ? EMOJI[Math.floor(Math.random()*EMOJI.length)] : null,
      color: COLORS[Math.floor(Math.random()*COLORS.length)]
    });
  }
  if (!confettiRaf) confettiLoop();
}
function confettiLoop() {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts = parts.filter(p => p.life > 0);
  if (!parts.length) { confettiRaf = null; return; }
  for (const p of parts) {
    p.x += p.vx; p.y += p.vy; p.vy += .28; p.vx *= .99; p.rot += p.vr; p.life -= .012;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180); ctx.globalAlpha = Math.max(p.life,0);
    if (p.emoji) { ctx.font = p.size*2 + 'px serif'; ctx.fillText(p.emoji, -p.size, p.size/2); }
    else { ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*.66); }
    ctx.restore();
  }
  confettiRaf = requestAnimationFrame(confettiLoop);
}

/* ─────────────────────── meme card ─────────────────────── */
const mCvs = $('#memeCanvas'), mCtx = mCvs.getContext('2d');
function showMeme(n) {
  const W = 720, H = 720;
  const g = mCtx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#2d2d4a'); g.addColorStop(1,'#232338');
  mCtx.fillStyle = g; mCtx.fillRect(0,0,W,H);
  /* sparkles */
  mCtx.globalAlpha = .5;
  for (let i = 0; i < 26; i++) {
    mCtx.font = (10+Math.random()*16)+'px serif';
    mCtx.fillText(['✨','⭐','🫧'][i%3], Math.random()*W, Math.random()*H);
  }
  mCtx.globalAlpha = 1;
  /* button blob */
  mCtx.beginPath(); mCtx.arc(W/2, 268, 128, 0, Math.PI*2);
  const bg = mCtx.createRadialGradient(W/2-46, 220, 20, W/2, 268, 130);
  bg.addColorStop(0,'#ff9aa8'); bg.addColorStop(1,'#ee5265');
  mCtx.fillStyle = bg; mCtx.fill();
  /* face */
  mCtx.fillStyle = '#5c1f2e';
  mCtx.beginPath(); mCtx.ellipse(W/2-42, 252, 9, 13, 0, 0, Math.PI*2); mCtx.fill();
  mCtx.beginPath(); mCtx.ellipse(W/2+42, 252, 9, 13, 0, 0, Math.PI*2); mCtx.fill();
  mCtx.lineWidth = 7; mCtx.strokeStyle = '#5c1f2e'; mCtx.lineCap = 'round';
  mCtx.beginPath(); mCtx.arc(W/2, 292, 17, .15*Math.PI, .85*Math.PI); mCtx.stroke();
  mCtx.globalAlpha = .4; mCtx.fillStyle = '#fff';
  mCtx.beginPath(); mCtx.ellipse(W/2-78, 300, 15, 8, 0, 0, Math.PI*2); mCtx.fill();
  mCtx.beginPath(); mCtx.ellipse(W/2+78, 300, 15, 8, 0, 0, Math.PI*2); mCtx.fill();
  mCtx.globalAlpha = 1;
  /* texts */
  mCtx.textAlign = 'center';
  mCtx.fillStyle = '#fff5e1'; mCtx.font = '800 52px Pretendard, sans-serif';
  mCtx.fillText('오늘 ' + n.toLocaleString('ko-KR') + '번째로', W/2, 476);
  mCtx.fillText('퇴사버튼을 눌렀습니다', W/2, 544);
  mCtx.fillStyle = '#a5a1c9'; mCtx.font = '500 26px Pretendard, sans-serif';
  mCtx.fillText('당신만 그런 게 아니에요 🤍', W/2, 600);
  mCtx.fillStyle = '#6d6a96'; mCtx.font = '600 22px Pretendard, sans-serif';
  mCtx.fillText('퇴사버튼 🔴', W/2, 668);
  $('#memeModal').classList.add('show');
}
$('#closeMeme').onclick = () => $('#memeModal').classList.remove('show');
$('#memeModal').onclick = e => { if (e.target === $('#memeModal')) $('#memeModal').classList.remove('show'); };
$('#saveMeme').onclick = async () => {
  const blob = await new Promise(r => mCvs.toBlob(r, 'image/png'));
  const file = new File([blob], 'quit-button.png', { type: 'image/png' });
  if (navigator.share && navigator.canShare?.({ files: [file] })) {
    try { await navigator.share({ files: [file], title: '퇴사버튼 🔴' }); return; } catch {}
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'quit-button.png'; a.click();
  toast('이미지를 저장했어요! 🎁');
};

/* ─────────────────────── reason feed ─────────────────────── */
const MASK_PATTERNS = [
  [/(삼성|엘지|LG|현대|카카오|네이버|쿠팡|배민|토스)[\w가-힣]*/g, '(어느 회사)'],
  [/[가-힣]{2,3}\s?(부장|과장|차장|팀장|대리|사원|이사|대표)님?/g, '(그분)'],
];
function maskText(t) { let m = t; for (const [re, rep] of MASK_PATTERNS) m = m.replace(re, rep); return m; }

const DEMO_FEED = [
  { text: '점심 먹으러 나가는데 "어디 가?"라고 물어보심. 점심시간인데요…', metoo: 2847 },
  { text: '내가 만든 기획서가 (그분) 이름으로 임원회의에 올라감 🙂', metoo: 1932 },
  { text: '금요일 오후 5시 50분에 "간단한 거 하나만"이라며 새 업무 주심', metoo: 1518 },
  { text: '재택 신청했더니 "요즘 애들은…"으로 시작하는 20분 훈화 말씀', metoo: 903 },
  { text: '회식을 "업무의 연장"이라고 하셔서 야근수당 여쭤봤다가 정적…', metoo: 611 },
];
const myFeed = store.get('feed', []);
const metooSet = new Set(store.get('metoo', []));

function feedCard(item, idx, mine) {
  const el = document.createElement('div');
  el.className = 'feed-card';
  const id = mine ? 'm'+idx : 'd'+idx;
  const on = metooSet.has(id);
  el.innerHTML = `
    <div class="feed-text">${item.text}</div>
    <div class="feed-foot">
      <span class="feed-time">${mine ? '내가 쓴 글 · 익명' : '익명 · 예시'}</span>
      <button class="btn-metoo ${on?'on':''}" data-id="${id}">나도 🔴 <span>${(item.metoo + (on?1:0)).toLocaleString('ko-KR')}</span></button>
    </div>`;
  el.querySelector('.btn-metoo').onclick = function() {
    const was = metooSet.has(id);
    if (was) metooSet.delete(id); else metooSet.add(id);
    store.set('metoo', [...metooSet]);
    this.classList.toggle('on', !was);
    this.querySelector('span').textContent = (item.metoo + (was?0:1)).toLocaleString('ko-KR');
    this.classList.remove('pop2'); void this.offsetWidth; this.classList.add('pop2');
    vibrate(12);
    if (!was) toast('당신만 그런 게 아니래요 🤍');
  };
  return el;
}
function renderFeed() {
  const f = $('#feed'); f.innerHTML = '';
  myFeed.forEach((it, i) => f.appendChild(feedCard(it, i, true)));
  DEMO_FEED.forEach((it, i) => f.appendChild(feedCard(it, i, false)));
}
renderFeed();

const input = $('#reasonInput'), postBtn = $('#postBtn'), charCount = $('#charCount');
input.addEventListener('input', () => {
  charCount.textContent = input.value.length + ' / 140';
  postBtn.disabled = input.value.trim().length === 0;
});
postBtn.onclick = () => {
  const raw = input.value.trim();
  if (!raw) return;
  const masked = maskText(raw);
  myFeed.unshift({ text: masked, metoo: 0 });
  store.set('feed', myFeed.slice(0, 30));
  input.value = ''; charCount.textContent = '0 / 140'; postBtn.disabled = true;
  renderFeed();
  vibrate(20);
  toast(masked !== raw ? '살짝 가려서 올렸어요 🫥' : '털어놨어요. 후련하죠? 🫧');
};
</script>
