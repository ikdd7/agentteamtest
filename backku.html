<style>

 .ptile .ov{position:absolute;left:0;right:0;bottom:0;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,.45));color:#fff;font-size:12px;font-weight:700}
 .ptile .lk{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.35);color:#fff;font-size:11px;padding:3px 7px;border-radius:999px}

 .go{width:100%;padding:15px;border:0;border-radius:13px;background:var(--pk);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:18px}

 .noti .ni{font-size:22px} .noti .nt{font-size:14px;line-height:1.4} .noti .nd{font-size:11px;color:var(--mut);margin-top:2px}
 /* 마이 */
 .seg{display:flex;background:#f0e3ea;border-radius:12px;padding:4px;margin-bottom:14px}
 .seg button{flex:1;border:0;background:none;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:#86707c;cursor:pointer}.seg button.on{background:#fff;color:var(--ink)}
 .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
 .gtile{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(180,90,140,.07)}.gtile .e{font-size:30px;display:block}.gtile .n{font-size:12px;font-weight:700;margin-top:5px}.gtile .b{font-size:10px;color:var(--mut)}
 .empty{color:var(--mut);text-align:center;padding:40px 16px;font-size:14px;line-height:1.6}
 .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;display:flex;box-shadow:0 -2px 14px rgba(180,90,140,.12);z-index:50}
 .nav button{flex:1;border:0;background:none;padding:9px 0 11px;font-size:11px;font-weight:700;color:#c0a9b5;cursor:pointer;position:relative}
 .nav button .i{font-size:21px;display:block;margin-bottom:2px} .nav button.on{color:var(--pk)}
 .nav .dot{position:absolute;top:7px;right:28%;width:7px;height:7px;background:var(--pk);border-radius:50%}
 .screen{display:none}.screen.on{display:block}
</style></head>
<body><div class="app">
 <div class="bar" id="bar"></div>
 <section class="screen on" id="scr-home"></section>
 <section class="screen" id="scr-explore"></section>

</div>

<script>

function lsGet(k){try{return localStorage.getItem(k)}catch(_){return (k in MEM)?MEM[k]:null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(_){MEM[k]=v}}
const load=(k,dv)=>{try{const v=JSON.parse(lsGet("backku:"+k));return v==null?dv:v}catch(_){return dv}};
const save=(k,v)=>lsSet("backku:"+k,JSON.stringify(v));
const shop=q=>"https://search.shopping.naver.com/search/all?query="+encodeURIComponent(q+" 키링");

 {id:"s5",ttl:"최애 덕질백",cr:"@my_fav",vibe:"덕질",bagType:"숄더백",bagBrand:"마리떼",charms:["chunsik","kitty","stitch"],likes:276},
 {id:"s6",ttl:"데님백 큐티 조합",cr:"@denim.day",vibe:"큐트",bagType:"에코백",bagBrand:"자라",charms:["bonecdo","smiski"],likes:154},
 {id:"s7",ttl:"라부부 + 펄체인",cr:"@popmart_kr",vibe:"맥시멀",bagType:"토트백",bagBrand:"분크",charms:["labubu","pearl_chain"],likes:402},

  '<span class="vibechip">'+L.vibe+'</span>'+(feat?'<span class="badge">✨ 오늘의 추천</span>':'')+hero+'</div>'+
  '<div class="info"><div class="lt">'+L.ttl+'</div><div class="cr">'+(L.bagType?BAGEMO[L.bagType]+' '+(L.bagBrand&&L.bagBrand!=="기타"?L.bagBrand+' ':'')+L.bagType+' · ':'')+(L.cr||'@나')+' · 아이템 '+L.charms.length+'개</div>'+
  '<div class="acts"><button data-like="'+L.id+'" class="'+(liked?'on':'')+'">'+(liked?'❤️':'🤍')+' <span>'+likeCount(L)+'</span></button>'+
  '<button data-savelook="'+L.id+'" class="'+(saved?'on':'')+'">'+(saved?'🔖 저장됨':'🔖 저장')+'</button></div></div></div>';
}
/* 홈 = 에디터 추천 피드 (무드 필터 없음, 카테고리 컬렉션) */
function renderHome(){
 const list=allLooks();
 const feat=list.slice().sort((a,b)=>likeCount(b)-likeCount(a))[0];
 const colls=CATS.map(c=>{const m=CATMETA[c];return '<div class="col" style="background:'+m.bg+';color:#5a3a4a" data-gocat="'+c+'"><b>'+m.e+' '+c+'</b><span>'+m.d+'</span></div>'}).join('');
 document.getElementById("scr-home").innerHTML=
  '<div class="body" style="padding-top:8px">'+
   (feat?lookCard(feat,true):'')+
   '<div class="sectit">🛍️ 카테고리별 구경</div><div class="colrow">'+colls+'</div>'+
   '<div class="sectit">최신 백꾸</div>'+
   (list.length?list.map(L=>lookCard(L)).join(''):'<div class="empty">아직 룩이 없어요.</div>')+
  '</div>';
}
/* 탐색 = 남들 사진 그리드 */
function ptile(L){
 const bg=L.photo?'':('background:'+(GRAD[L.vibe]||GRAD.큐트));
 const hero=L.photo?'<img src="'+L.photo+'">':heroInner(L);
 return '<div class="ptile" data-look="'+L.id+'" style="'+bg+'">'+hero+'<span class="lk">❤️ '+likeCount(L)+'</span><div class="ov">'+L.ttl+'</div></div>';
}
function renderExplore(q){
 q=(q==null?exploreQ:q).trim();exploreQ=q;
 let list=allLooks();
 if(exploreCat!=="전체")list=list.filter(L=>L.charms.some(id=>catOf(id)===exploreCat));
 if(q)list=list.filter(L=>L.ttl.includes(q)||L.cr.includes(q)||L.charms.some(id=>CHARMS[id]&&(CHARMS[id].nm.includes(q)||CHARMS[id].br.includes(q))));
 const chips=["전체"].concat(CATS).map(c=>'<button class="fc'+(exploreCat===c?' on':'')+'" data-excat="'+c+'">'+(c==="전체"?c:(CATMETA[c].e+" "+c))+'</button>').join('');
 document.getElementById("scr-explore").innerHTML=
  '<div class="body" style="padding-top:6px"><input class="search" id="q" type="text" placeholder="룩·아이템·브랜드 검색" value="'+q.replace(/"/g,'&quot;')+'"></div>'+
  '<div class="filters">'+chips+'</div>'+
  '<div class="body"><div class="sectit">👀 다른 사람들의 백꾸'+(exploreCat!=="전체"?' · '+exploreCat:'')+'</div>'+
  (list.length?'<div class="pgrid">'+list.map(ptile).join('')+'</div>':'<div class="empty">결과가 없어요.</div>')+'</div>';
 const qi=document.getElementById("q");qi.oninput=e=>{const v=e.target.value;renderExplore(v);const n=document.getElementById("q");if(n){n.focus();n.setSelectionRange(v.length,v.length)}};
}
/* 상세 */
function openDetail(id){cur=findLook(id);if(!cur)return;go("detail")}
function renderDetail(){
 const L=cur;const saved=board.some(b=>b.id===L.id);
 const hero=L.photo?'<img src="'+L.photo+'">':heroInner(L);
 const rows=L.charms.map(id=>{const c=CHARMS[id];if(!c)return'';const w=wish.includes(id);
  return '<div class="crow"><span class="ce">'+c.e+'</span><div><div class="cn">'+c.nm+'</div><div class="cb">'+c.cat+' · '+c.src+'</div></div>'+
   '<div class="cbtns"><button class="w'+(w?' on':'')+'" data-wish="'+id+'">'+(w?'♥':'위시')+'</button>'+
   '<a class="buy" href="'+shop(c.nm)+'" target="_blank" rel="noopener">구매</a></div></div>'}).join('');
 const sim=allLooks().filter(x=>x.vibe===L.vibe&&x.id!==L.id).slice(0,6)
  .map(x=>'<div class="pp" data-look="'+x.id+'"><div class="e">'+bagEmoji(x)+'</div><div class="n">'+x.ttl+'</div></div>').join('')||'<div class="cb" style="color:var(--mut)">준비 중</div>';
 document.getElementById("detail").innerHTML=
  '<div class="dhero'+(L.photo?' photo':'')+'" style="background:'+(GRAD[L.vibe]||GRAD.큐트)+'">'+hero+'</div>'+
  '<div class="dwrap"><div class="dttl">'+L.ttl+'</div><div class="dcr">'+(L.cr||'@나')+' · '+L.vibe+' · ❤️ '+likeCount(L)+'</div>'+
  '<div class="sectit">🛍️ 이 가방</div><div class="crow"><span class="ce">'+bagEmoji(L)+'</span><div><div class="cn">'+(L.bagBrand&&L.bagBrand!=="기타"?L.bagBrand+' ':'')+(L.bagType||"가방")+'</div><div class="cb">'+(L.bagBrand&&L.bagBrand!=="기타"?L.bagBrand+' · ':'')+'이 룩의 베이스 가방</div></div></div>'+
  '<div class="sectit">📍 이 가방에 단 아이템 '+L.charms.length+'개</div>'+rows+
  '<button class="dsave'+(saved?' on':'')+'" data-savelook="'+L.id+'">'+(saved?'✓ 보드에 저장됨':'♥ 이 룩 보드에 저장')+'</button>'+
  '<div class="sectit">비슷한 '+L.vibe+' 룩</div><div class="pillrow">'+sim+'</div></div>';
}
/* 키링 시트 */
function openCharm(id){const c=CHARMS[id];if(!c)return;const used=allLooks().filter(L=>L.charms.includes(id)).length;const w=wish.includes(id);
 document.body.insertAdjacentHTML("beforeend",'<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:flex;align-items:flex-end" id="ov"><div style="background:#fff;width:100%;max-width:480px;margin:0 auto;border-radius:22px 22px 0 0;padding:24px;text-align:center"><div style="font-size:54px">'+c.e+'</div><div style="font-size:20px;font-weight:800;margin-top:6px">'+c.nm+'</div><div style="font-size:13px;color:var(--mut)">'+c.cat+' · '+c.src+' · 룩 '+used+'개</div><a href="'+shop(c.nm)+'" target="_blank" rel="noopener" style="display:block;background:var(--pk);color:#fff;border-radius:12px;padding:14px;font-weight:800;margin-top:16px;text-decoration:none">구매처에서 보기 →</a><button id="ovw" style="display:block;width:100%;background:#f3e6ef;color:#a06;border:0;border-radius:12px;padding:13px;font-weight:700;margin-top:8px;cursor:pointer">'+(w?'♥ 위시 담음':'위시리스트 담기')+'</button><button id="ovc" style="background:none;border:0;color:var(--mut);margin-top:10px;cursor:pointer">닫기</button></div></div>');
 document.getElementById("ov").onclick=e=>{if(e.target.id==="ov")e.currentTarget.remove()};
 document.getElementById("ovc").onclick=()=>document.getElementById("ov").remove();
 document.getElementById("ovw").onclick=()=>{toggleWish(id);const o=document.getElementById("ov");if(o)o.remove()};
}
function toggleWish(id){const i=wish.indexOf(id);if(i>=0)wish.splice(i,1);else wish.push(id);save("wish",wish);if(curScreen==="detail")renderDetail();if(curScreen==="my")renderMy()}
/* 올리기 */
const post={photo:null,charms:[],mood:null,bagType:null,bagBrand:null};
function renderPost(){
 document.getElementById("post").innerHTML='<label>1. 내 가방 사진</label><div class="photo" id="pPhoto">'+(post.photo?'<img src="'+post.photo+'">':'사진을 올리면 미리보기 📷')+'</div><label class="upbtn" for="pFile">사진 올리기</label><input id="pFile" type="file" accept="image/*" style="display:none"><label>2. 내 가방 종류</label><div class="chips" id="pBag"></div><label>3. 가방 브랜드</label><div class="chips" id="pBrand"></div><label>4. 단 아이템 (검색으로 추가하거나 아래에서 선택)</label><div class="srch"><input id="pSearch" type="text" placeholder="키링·액세서리 이름 → 추가"><button id="pAddItem">추가</button></div><div class="selrow" id="pSel"></div><div id="pPick"></div><label>5. 무드</label><div class="chips" id="pMood"></div><label>6. 제목</label><input type="text" id="pTtl" placeholder="예: 파스텔 큐티 백꾸"><button class="go" id="pGo">피드에 올리기 →</button>';
 const bg=document.getElementById("pBag");BAGS.forEach(t=>{const b=document.createElement("button");b.className="chip"+(post.bagType===t?" on":"");b.textContent=BAGEMO[t]+" "+t;b.setAttribute("data-pbag",t);bg.appendChild(b)});
 const brd=document.getElementById("pBrand");BAGBRANDS.forEach(t=>{const b=document.createElement("button");b.className="chip"+(post.bagBrand===t?" on":"");b.textContent=t;b.setAttribute("data-pbrand",t);brd.appendChild(b)});
 const pg=document.getElementById("pPick");
 CATS.forEach(cat=>{const ids=Object.keys(CHARMS).filter(id=>CHARMS[id].cat===cat);if(!ids.length)return;
  const h=document.createElement("div");h.style.cssText="font-size:12px;font-weight:700;color:#b58;margin:10px 2px 6px";h.textContent=CATMETA[cat].e+" "+cat;pg.appendChild(h);
  const grid=document.createElement("div");grid.className="pickgrid";
  ids.forEach(id=>{const c=CHARMS[id];const b=document.createElement("button");b.className="pick"+(post.charms.includes(id)?" on":"");b.setAttribute("data-pick",id);b.innerHTML='<span class="e">'+c.e+'</span>'+c.nm;grid.appendChild(b)});
  pg.appendChild(grid);});
 const sel=document.getElementById("pSel");sel.innerHTML=post.charms.map(id=>{const c=CHARMS[id];return c?'<button class="selchip" data-unpick="'+id+'">'+c.e+' '+c.nm+' ✕</button>':''}).join('');
 const addBtn=document.getElementById("pAddItem");if(addBtn)addBtn.onclick=()=>{const inp=document.getElementById("pSearch");const v=inp.value.trim();if(!v)return;const id="c"+Date.now();CUSTOM[id]={nm:v,e:"🔗",cat:"기타",src:"검색",br:""};CHARMS[id]=CUSTOM[id];save("custom",CUSTOM);post.charms.push(id);renderPost()};
 const mg=document.getElementById("pMood");MOODS.forEach(m=>{const b=document.createElement("button");b.className="chip"+(post.mood===m?" on":"");b.textContent=m;b.setAttribute("data-pmood",m);mg.appendChild(b)});
 document.getElementById("pFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{post.photo=rd.result;renderPost()};rd.readAsDataURL(f)};
 document.getElementById("pGo").onclick=()=>{if(post.charms.length===0){alert("키링을 하나 이상 골라줘!");return}const ttl=document.getElementById("pTtl").value.trim()||((post.mood||"나의")+" 백꾸");mine.unshift({id:"u"+Date.now(),ttl:ttl,cr:"@나",vibe:post.mood||"큐트",bagType:post.bagType||"토트백",bagBrand:post.bagBrand||"기타",charms:post.charms.slice(),photo:post.photo,likes:0});save("mine",mine);post.photo=null;post.charms=[];post.mood=null;post.bagType=null;post.bagBrand=null;go("home");alert("피드에 올렸어! 🎉")};
}
/* 알림 */
function renderNoti(){
 const dyn=[];
 if(mine.length)dyn.push({ic:"📷",t:"회원님이 올린 백꾸 "+mine.length+"개가 노출되고 있어요",d:"오늘"});
 if(board.length)dyn.push({ic:"🔖",t:"회원님이 저장한 룩 "+board.length+"개",d:"오늘"});
 document.getElementById("noti").innerHTML='<div class="sectit" style="margin-top:6px">알림</div>'+
  dyn.concat(NOTI).map(n=>'<div class="noti"><span class="ni">'+n.ic+'</span><div><div class="nt">'+n.t+'</div><div class="nd">'+n.d+'</div></div></div>').join('');
 const dot=document.querySelector('.nav .dot');if(dot)dot.style.display="none";
}
/* 마이 */
function renderMy(){
 const gtile=id=>{const c=CHARMS[id];if(!c)return '';return '<div class="gtile" data-charm="'+id+'"><span class="e">'+c.e+'</span><div class="n">'+c.nm+'</div><div class="b">'+c.br+'</div></div>'};
 let html='<div class="seg">'+[["board","♥ 저장한 룩"],["mine","📷 내가 올린"],["wish","🛍️ 위시"]].map(s=>'<button class="'+(mySeg===s[0]?'on':'')+'" data-seg="'+s[0]+'">'+s[1]+'</button>').join('')+'</div>';
 if(mySeg==="board")html+=board.length?board.map(L=>lookCard(L)).join(''):'<div class="empty">저장한 룩이 없어요<br>홈/탐색에서 🔖 저장해보세요!</div>';
 else if(mySeg==="mine")html+=mine.length?mine.map(L=>lookCard(L)).join(''):'<div class="empty">올린 백꾸가 없어요<br>올리기에서 공유해보세요!</div>';
 else html+=wish.length?('<div class="grid3">'+wish.map(gtile).join('')+'</div>'):'<div class="empty">위시 키링이 없어요<br>룩 상세에서 위시 담아보세요!</div>';
 document.getElementById("myroot").innerHTML=html;
}
/* 라우팅 */
const TITLES={home:"가방 꾸미기 큐레이션",explore:"탐색",post:"내 백꾸 올리기",noti:"알림",my:"마이",detail:""};
function go(scr){
 curScreen=scr;
 document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("on",s.id==="scr-"+scr));
 document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.getAttribute("data-go")===scr));
 const back=scr==="detail";
 document.getElementById("bar").innerHTML=back?'<button class="back" id="bk">‹</button><span class="ttl" style="color:var(--ink);font-weight:800;font-size:17px">룩 상세</span>':'<span class="logo">백꾸</span><span class="ttl">'+(TITLES[scr]||"")+'</span>';
 if(back)document.getElementById("bk").onclick=()=>go("home");
 try{
  if(scr==="home")renderHome();else if(scr==="explore")renderExplore("");else if(scr==="post")renderPost();
  else if(scr==="noti")renderNoti();else if(scr==="my")renderMy();else if(scr==="detail")renderDetail();
 }catch(err){document.getElementById("scr-"+scr).innerHTML='<div class="empty">⚠️ 화면 오류(캡처해 보내줘):<br>'+(err&&err.message||err)+'</div>';}
 try{window.scrollTo&&window.scrollTo(0,0)}catch(_){}
}
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>go(b.getAttribute("data-go")));
document.addEventListener("click",e=>{const t=e.target;
 const pick=t.closest&&t.closest("[data-pick]");if(pick){const id=pick.getAttribute("data-pick");const i=post.charms.indexOf(id);if(i>=0)post.charms.splice(i,1);else post.charms.push(id);renderPost();return}
 const up=t.closest&&t.closest("[data-unpick]");if(up){const id=up.getAttribute("data-unpick");const i=post.charms.indexOf(id);if(i>=0)post.charms.splice(i,1);renderPost();return}
 const pm=t.getAttribute&&t.getAttribute("data-pmood");if(pm){post.mood=pm;renderPost();return}
 const pb=t.getAttribute&&t.getAttribute("data-pbag");if(pb){post.bagType=pb;renderPost();return}
 const pbr=t.getAttribute&&t.getAttribute("data-pbrand");if(pbr){post.bagBrand=pbr;renderPost();return}
 const sg=t.getAttribute&&t.getAttribute("data-seg");if(sg){mySeg=sg;renderMy();return}
 const gc=t.closest&&t.closest("[data-gocat]");if(gc){exploreCat=gc.getAttribute("data-gocat");exploreQ="";go("explore");return}
 const ec=t.closest&&t.closest("[data-excat]");if(ec){exploreCat=ec.getAttribute("data-excat");renderExplore(exploreQ);return}
 const lk=t.closest&&t.closest("[data-like]");if(lk){const id=lk.getAttribute("data-like");likes[id]=!likes[id];save("likes",likes);if(curScreen==="home")renderHome();else if(curScreen==="detail")renderDetail();else if(curScreen==="my")renderMy();return}
 const sl=t.closest&&t.closest("[data-savelook]");if(sl){const id=sl.getAttribute("data-savelook");const L=findLook(id);const bi=board.findIndex(b=>b.id===id);if(bi>=0)board.splice(bi,1);else if(L)board.unshift(L);save("board",board);if(curScreen==="detail")renderDetail();else if(curScreen==="my")renderMy();else renderHome();return}
 const wi=t.getAttribute&&t.getAttribute("data-wish");if(wi){toggleWish(wi);return}
 const ch=t.closest&&t.closest("[data-charm]");if(ch){openCharm(ch.getAttribute("data-charm"));return}
 const lo=t.closest&&t.closest("[data-look]");if(lo){openDetail(lo.getAttribute("data-look"));return}
});
try{go("home")}catch(e){document.body.insertAdjacentHTML("afterbegin",'<pre style="color:#c00;padding:12px;white-space:pre-wrap">⚠️ 오류(캡처해 보내줘):\n'+(e&&e.stack||e)+'</pre>')}
</script></body></html>
